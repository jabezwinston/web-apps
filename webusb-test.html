<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebUSB Test</title>
    <meta name="color-scheme" content="light dark">
    <style>
        body {
            font-family: system-ui, sans-serif;
            font-size: 1.15rem;
            margin: 2rem;
            max-width: 820px;
            line-height: 1.5;
        }

        button {
            margin-right: .5rem;
        }

        input {
            padding: .3rem;
            width: 16rem;
        }

        section {
            margin: 1rem 0;
        }

        #info {
            background: rgba(127, 127, 127, .15);
            padding: .75rem;
            border-radius: 6px;
        }

        a {
            color: #4f8cff;
        }

        #log {
            font-family: monospace;
            font-size: 1rem;
            background: #111;
            color: #ddd;
            padding: .75rem;
            height: 14rem;
            overflow: auto;
            white-space: pre-wrap;
            border-radius: 6px;
        }

        .err {
            color: #e55;
        }

        .tx {
            color: #6cb6ff;
        }

        .rx {
            color: #7ee787;
        }
    </style>
    <link rel="icon" href="data:,">
    <meta name="robots" content="noindex">
</head>

<body>
    <h1>WebUSB Test</h1>
    <p>Connect to any WebUSB device: sends your text to its first bulk OUT endpoint and
        prints whatever comes back on the matching bulk IN. The interface and endpoints
        are discovered from the device. Needs Chrome/Edge over HTTPS or
        <code>localhost</code>.</p>

    <section>
        <button id="connect">Connect</button>
        <button id="disconnect" disabled>Disconnect</button>
        <span id="status">disconnected</span>
    </section>

    <pre id="info" hidden></pre>

    <section id="io" hidden>
        <input id="msg" type="text" value="hello from WebUSB" autocomplete="off">
        <button id="send">Send</button>
    </section>

    <div id="log"></div>

    <script>
        const WEBUSB_GET_URL = 0x02;
        const WEBUSB_UUID = [0x38, 0xB6, 0x08, 0x34, 0xA9, 0x09, 0xA0, 0x47,
                             0x8B, 0xFD, 0xA0, 0x76, 0x88, 0x15, 0xB6, 0x65];

        let device = null, ep = null;          // ep = { iface, alt, out, in }
        const $ = id => document.getElementById(id);
        const enc = new TextEncoder(), dec = new TextDecoder();
        const hex = (n, w) => n.toString(16).padStart(w, "0");

        function log(msg, isErr) {
            logParts(isErr ? span("err", msg) : msg);
        }

        function logParts(...parts) {                    // a log line built from text / coloured spans
            const line = document.createElement("div");
            line.append(`[${new Date().toLocaleTimeString()}] `, ...parts);
            $("log").appendChild(line);
            $("log").scrollTop = $("log").scrollHeight;
        }

        function span(cls, text) {
            const s = document.createElement("span");
            s.className = cls;
            s.textContent = text;
            return s;
        }

        function setConnected(on) {
            $("connect").disabled = on;
            $("disconnect").disabled = !on;
            $("status").textContent = on ? "connected" : "disconnected";
            $("info").hidden = !on;
            $("io").hidden = !on;
        }

        // discover an interface that has both a bulk OUT and a bulk IN endpoint
        function findBulkInterface(dev) {
            for (const iface of dev.configuration.interfaces) {
                for (const alt of iface.alternates) {
                    const out = alt.endpoints.find(e => e.direction === "out" && e.type === "bulk");
                    const inp = alt.endpoints.find(e => e.direction === "in" && e.type === "bulk");
                    if (out && inp) return {
                        iface: iface.interfaceNumber, alt: alt.alternateSetting,
                        out: out.endpointNumber, in: inp.endpointNumber,
                    };
                }
            }
            return null;
        }

        // read the BOS, find the WebUSB platform cap -> its vendor code (best-effort)
        async function readWebusbCap() {
            try {
                const hdr = await device.controlTransferIn({
                    requestType: "standard", recipient: "device",
                    request: 0x06, value: 0x0F00, index: 0
                }, 5);
                if (hdr.status !== "ok") return null;
                const total = hdr.data.getUint16(2, true);
                const full = await device.controlTransferIn({
                    requestType: "standard", recipient: "device",
                    request: 0x06, value: 0x0F00, index: 0
                }, total);
                const b = new Uint8Array(full.data.buffer);
                for (let off = 5; off < total; off += b[off]) {
                    if (b[off + 1] === 0x10 && b[off + 2] === 0x05 &&
                        WEBUSB_UUID.every((x, i) => x === b[off + 4 + i]))
                        return { vendorCode: b[off + 22], landingPage: b[off + 23] };
                }
            } catch (e) { /* browsers may block standard control transfers */ }
            return null;
        }

        async function readLandingUrl(vendorCode, index) {
            const r = await device.controlTransferIn({
                requestType: "vendor", recipient: "device",
                request: vendorCode, value: index, index: WEBUSB_GET_URL
            }, 255);
            if (r.status !== "ok") throw new Error("GET_URL status " + r.status);
            const v = r.data;
            const scheme = { 0: "http://", 1: "https://", 255: "" }[v.getUint8(2)] ?? "";
            let url = "";
            for (let i = 3; i < v.byteLength; i++) url += String.fromCharCode(v.getUint8(i));
            return scheme + url;
        }

        $("connect").onclick = async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [] });   // any device
                await device.open();
                if (device.configuration === null) await device.selectConfiguration(1);

                ep = findBulkInterface(device);
                if (!ep) throw new Error("device has no bulk IN + OUT endpoint pair");
                await device.claimInterface(ep.iface);
                if (ep.alt) await device.selectAlternateInterface(ep.iface, ep.alt);

                const lines = [
                    "Device:       " + hex(device.vendorId, 4) + ":" + hex(device.productId, 4),
                    "Product:      " + (device.productName || "—"),
                    "Manufacturer: " + (device.manufacturerName || "—"),
                    "Serial:       " + (device.serialNumber || "—"),
                    "USB version:  " + device.usbVersionMajor + "." +
                        device.usbVersionMinor + device.usbVersionSubminor,
                    "Endpoints:    interface " + ep.iface + ", bulk OUT 0x" + hex(ep.out, 2) +
                        " / IN 0x" + hex(0x80 | ep.in, 2),
                ];
                $("info").textContent = lines.join("\n");

                const cap = await readWebusbCap();
                if (cap) {                                  // clickable landing URL, kept inside #info
                    const url = await readLandingUrl(cap.vendorCode, cap.landingPage);
                    const a = document.createElement("a");
                    a.href = url; a.textContent = url;
                    a.target = "_blank"; a.rel = "noopener";
                    $("info").append("\nLanding URL:  ", a);
                }

                log("connected; claimed interface " + ep.iface);
                setConnected(true);
            } catch (e) {
                log("connect failed: " + e.message, true);
            }
        };

        $("disconnect").onclick = async () => {
            try { if (device) await device.close(); } catch (e) { }
            device = null; ep = null;
            setConnected(false);
            log("disconnected");
        };

        $("send").onclick = async () => {
            try {
                const text = $("msg").value;
                const sent = enc.encode(text);
                await device.transferOut(ep.out, sent);
                const r = await device.transferIn(ep.in, Math.max(64, sent.length));
                logParts("sent ", span("tx", `"${text}"`),
                    ` (${r.data.byteLength}B) → received `, span("rx", `"${dec.decode(r.data)}"`));
            } catch (e) {
                log("transfer failed: " + e.message, true);
            }
        };

        navigator.usb?.addEventListener("disconnect", e => {
            if (device && e.device === device) { device = null; ep = null; setConnected(false); log("device unplugged"); }
        });

        if (!("usb" in navigator)) {
            log("WebUSB is not available in this browser. Use Chrome/Edge over HTTPS or localhost.", true);
            $("connect").disabled = true;
        } else {
            log("ready — click Connect and choose a WebUSB device.");
        }
    </script>
</body>

</html>
